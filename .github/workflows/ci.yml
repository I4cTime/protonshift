name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/

      - name: Typecheck
        run: pyright

  electron:
    name: Electron
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: electron/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (main)
        run: pnpm run build:electron

      - name: Typecheck renderer
        run: pnpm --filter protonshift-renderer exec tsc --noEmit

      - name: Build renderer
        run: pnpm run build:renderer
