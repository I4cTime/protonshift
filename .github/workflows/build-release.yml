name: Build & Release

on:
  release:
    # Fires when a release is published (including from draft); avoids duplicate runs with `created`
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: electron/pnpm-lock.yaml

      - name: Install Linux packaging tools (rpm, flatpak)
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08 \
            org.electronjs.Electron2.BaseApp//24.08

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux packages (AppImage, deb, rpm, flatpak)
        run: pnpm run dist

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/*.AppImage
            build/*.deb
            build/*.rpm
            build/*.flatpak
