<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e28"/>
      <stop offset="100%" stop-color="#0f0f14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <rect width="128" height="128" rx="24" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.4"/>
  <!-- Gamepad body -->
  <g filter="url(#glow)" transform="translate(64,58)">
    <path d="M-32,0 C-32,-14 -18,-24 0,-24 C18,-24 32,-14 32,0 C32,10 26,20 18,24 L14,14 L-14,14 L-18,24 C-26,20 -32,10 -32,0Z"
          fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- D-pad left -->
    <rect x="-22" y="-6" width="12" height="4" rx="1" fill="#00d4ff" opacity="0.7"/>
    <rect x="-20" y="-10" width="4" height="12" rx="1" fill="#00d4ff" opacity="0.7"/>
    <!-- Buttons right -->
    <circle cx="16" cy="-4" r="3" fill="#a855f7" opacity="0.8"/>
    <circle cx="22" cy="-8" r="3" fill="#ec4899" opacity="0.8"/>
    <!-- Analog sticks -->
    <circle cx="-10" cy="4" r="4" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
    <circle cx="8" cy="4" r="4" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Gear overlay -->
  <g transform="translate(88,30)" filter="url(#glow)">
    <path d="M0,-12 L3,-10 L4,-13 L7,-11 L6,-8 L9,-6 L8,-3 L11,-2 L10,1 L13,2 L11,5 L13,7 L10,8 L10,11 L7,10 L6,13 L3,11 L1,13 L-1,11 L-4,13 L-5,10 L-8,11 L-8,8 L-11,7 L-9,5 L-11,2 L-8,1 L-9,-2 L-6,-3 L-7,-6 L-4,-8 L-5,-11 L-2,-10 L-2,-13 L1,-12Z"
          fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>
    <circle cx="1" cy="0" r="5" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  </g>
</svg>
